# ACTORS v2 Configuration
# Enhanced Configuration Layer with Harper Henry Behavioral Guardrails

agents:
  portfolio_agent:
    max_risk: 0.15
    min_cultural_weight: 0.1
    festival_tilt: true
    enabled: true
  
  execution_agent:
    slippage_limit: 0.01
    hedge_enabled: true
    enabled: true
  
  defi_agent:
    max_protocol_risk: 0.2
    gas_optimization: true
    enabled: true
  
  risk_agent:
    var_confidence: 0.95
    stress_testing: true
    enabled: true

metrics:
  enable_rich_metrics: true
  export_formats:
    - csv
    - json
    - parquet
  export_frequency: daily
  track_cultural_exposure: true
  track_festival_impact: true
  track_ethical_compliance: true
  track_social_risk: true

harper_henry_guardrails:
  ethical_investment: true
  max_social_risk: 0.2
  cultural_alignment_min: 0.2
  festival_tilt_enabled: true
  min_cultural_weight: 0.1
  enforce_on_portfolio: true

festival_calendar:
  enabled: true
  region: "Guadalajara"
  tilt_factor: 1.2
  festivals:
    - name: "Fiestas de Octubre"
      start_date: "2024-10-01"
      end_date: "2024-10-31"
      related_sectors:
        - cultural_events
        - artisan_crafts
        - local_music
        - traditional_food
      tilt_factor: 1.3
    
    - name: "Festival Internacional de Cine"
      start_date: "2024-03-01"
      end_date: "2024-03-15"
      related_sectors:
        - film_production
        - cultural_events
        - hospitality
        - local_tourism
      tilt_factor: 1.2
    
    - name: "Encuentro Nacional de Mariachi"
      start_date: "2024-09-01"
      end_date: "2024-09-10"
      related_sectors:
        - traditional_music
        - cultural_events
        - artisan_crafts
        - local_tourism
      tilt_factor: 1.25

logging:
  level: "INFO"
  export_logs: true
  log_file: "logs/actors.log"
  enable_metrics_logging: true

portfolio:
  rebalance_frequency: "weekly"
  max_position_size: 0.2
  min_position_size: 0.01
  diversification_target: 10
  cultural_asset_min: 0.1
  festival_asset_min: 0.05

export_settings:
  output_directory: "exports"
  timestamp_format: "%Y%m%d_%H%M%S"
  compression: false
  include_metadata: true
